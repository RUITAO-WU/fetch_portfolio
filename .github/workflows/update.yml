name: Update Eastmoney NAVs

on:
  workflow_dispatch: {}
  schedule:
    # 每个周末（周六、周日）17:30 UTC 运行
    - cron: "30 17 * * 6,0"
    # 每月 28~31 日 17:30 UTC 运行（配合 check job 确保只在月末最后一天实际执行）
    - cron: "30 17 28-31 * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── 判断今天是否需要运行 ──────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Determine if we should run today
        id: check
        run: |
          # 手动触发时直接放行
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DAY_OF_WEEK=$(date -u +%u)   # 1=Mon … 6=Sat 7=Sun
          DAY_OF_MONTH=$(date -u +%-d) # 不带前导零

          # 计算当月最后一天
          LAST_DAY=$(date -u -d "$(date -u +%Y-%m-01) +1 month -1 day" +%-d)

          echo "day_of_week=$DAY_OF_WEEK  day_of_month=$DAY_OF_MONTH  last_day=$LAST_DAY"

          if [[ "$DAY_OF_WEEK" -ge 6 || "$DAY_OF_MONTH" -eq "$LAST_DAY" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 主构建任务 ────────────────────────────────────────────────────────
  build:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug runner egress IP
        run: |
          echo "egress ip:"
          curl -s https://api.ipify.org || true
          echo

      - name: Debug probe push2his with ut
        run: |
          URL="https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=0.164906&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt=101&fqt=1&end=20500000&lmt=200&ut=fa5fd1943c7b386f172d6893dbfba10b"
          echo "Probing: $URL"
          curl -v --compressed -m 20 \
            -H "User-Agent: Mozilla/5.0" \
            -H "Referer: https://quote.eastmoney.com/" \
            -H "Accept: application/json,text/plain,*/*" \
            "$URL" || true

      - name: Run fetch
        run: python fetch_eastmoney.py

      - name: List site dir
        run: |
          echo "==== site/ ===="
          ls -lh site || true

      - name: Check site not empty
        run: |
          if [ -z "$(ls -A site 2>/dev/null)" ]; then
            echo "site/ is empty, aborting deploy"
            exit 1
          fi

      - name: Commit artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update NAV data"
          branch: main
          file_pattern: |
            data/*.csv
            site/*.html
            site/*.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── 部署到 GitHub Pages ───────────────────────────────────────────────
  deploy:
    needs: [check, build]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
